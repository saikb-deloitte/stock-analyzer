# fly.toml app configuration file generated for centaur-prism on 2026-05-28T19:53:51-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'centaur-prism'
primary_region = 'bom'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]

[env]
  PORT = '8080'
  PUBLIC_MODE = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '1m0s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/freshness'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
