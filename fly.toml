# fly.toml app configuration file generated for centaur-prism on 2026-05-28T19:53:51-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'centaur-prism'
primary_region = 'bom'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]

[env]
  PORT = '8080'
  PUBLIC_MODE = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  # Health check tuned for gevent + curl_cffi blocking under screener load.
  # yfinance via curl_cffi doesn't yield to gevent, so when the single
  # worker is mid-screener (~30-60s), even /api/freshness can't respond.
  # If the check is too aggressive Fly kills the machine mid-fetch and
  # rotates traffic to a sibling that's *also* in the same state,
  # creating a flap loop. Long grace + tolerant timeout + slower
  # interval lets the worker recover.
  [[http_service.checks]]
    interval = '2m'
    timeout = '30s'
    grace_period = '90s'
    method = 'GET'
    path = '/api/freshness'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
