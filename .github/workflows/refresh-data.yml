name: Refresh Static Stock Data

on:
  schedule:
    # Twice daily, weekdays only. UTC times = US market open & post-close.
    - cron: '30 14 * * 1-5'   # 14:30 UTC = 9:30 AM ET (market open)
    - cron: '30 22 * * 1-5'   # 22:30 UTC = 5:30 PM ET (post-close)
  workflow_dispatch:           # Manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz curl_cffi

      - name: Fetch & save static OHLCV + info
        run: python scripts/fetch_static_data.py

      - name: Pre-compute screener snapshots
        run: python scripts/compute_screens.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "data: auto-refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
