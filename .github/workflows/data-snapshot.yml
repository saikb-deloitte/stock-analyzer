name: Daily data snapshot

# Runs every day at 4:00 UTC (= 9:30 AM IST, ~3 hours before NSE pre-open).
# Builds NIFTY 50 + key indices + picks → commits JSON to static/data/.
# Live Render/Fly app code is NEVER modified by this workflow.

on:
  schedule:
    # cron is in UTC
    # 4:00 UTC = 09:30 IST — captures end-of-prev-day data, ready before market opens
    - cron: '0 4 * * *'
  # Also allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write       # needed to push back commits

jobs:
  snapshot:
    name: Build & commit snapshot JSON
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency: snapshot-group   # one snapshot at a time

    steps:
      - name: Checkout Centaur-prism branch
        uses: actions/checkout@v4
        with:
          ref: Centaur-prism
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build snapshot JSON files
        run: |
          python scripts/build_snapshot.py --all
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain static/data/)" ]; then
            echo "No changes — skipping commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
            git status --short static/data/
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "Centaur Prism Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/data/
          git commit -m "[bot] daily data snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin Centaur-prism
